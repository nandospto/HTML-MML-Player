<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>MML Multi-Instrument Player - BSI Project</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            padding: 20px;
        }

        .mixer {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .channel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .channel h3 {
            margin-top: 0;
            color: #4caf50;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #2d2d2d;
            color: #00ff00;
            border: 1px solid #444;
            font-family: monospace;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background: #4caf50;
            border: none;
            color: white;
            border-radius: 4px;
        }

        button:hover {
            background: #45a049;
        }

        .status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>

<body>

    <h1>MML Multi-Channel Player</h1>
    <div class="controls" style="margin-bottom: 20px; display: flex; justify-content: center; gap: 20px;">
        <div>
            <label>BPM: </label>
            <input type="number" id="global-bpm" value="120"
                style="width: 60px; background: #2d2d2d; color: white; border: 1px solid #444;">
        </div>
        <div>
            <label>Duração Padrão (L): </label>
            <select id="global-length" style="background: #2d2d2d; color: white; border: 1px solid #444;">
                <option value="2n">2 (Mínima)</option>
                <option value="4n" selected>4 (Semínima)</option>
                <option value="8n">8 (Colcheia)</option>
                <option value="16n">16 (Semicolcheia)</option>
            </select>
        </div>
    </div>
    <div class="mixer">
        <div class="channel">
            <h3>Canal 1 - Melodia</h3>
            <textarea id="mml-ch1" placeholder="Ex: t120 l8 cdefgab>c">o3abcabc>abc</textarea>
        </div>

        <div class="channel">
            <h3>Canal 2 - Harmonia</h3>
            <textarea id="mml-ch2" placeholder="Ex: l4 <g b d g"> </textarea>
        </div>

        <div class="channel">
            <h3>Canal 3 - Bass</h3>
            <textarea id="mml-ch3" placeholder="Ex: l4 c < g > c < g"> </textarea>
        </div>

        <div class="channel">
            <h3>Canal 4 - Percussão</h3>
            <textarea id="mml-ch4" placeholder="Ex: l16 cccc dddd cccc dddd"> </textarea>
        </div>
    </div>

    <div class="controls">
        <button id="play-btn">Tocar Todos</button>
        <button id="stop-btn" style="background:#f44336;">Parar</button>
        <div class="status">Web Audio API Status: <span id="audio-status">Inativo</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="player.js"></script>
</body>

</html>
